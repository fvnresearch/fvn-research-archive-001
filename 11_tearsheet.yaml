failure_tests:
  version: "DFM_FAILURE_TESTS_V1"
  randomized_test_seed_count: 100
  critical_failures_block_verdict_a: true

random_label_tests:
  cross_sectional_shuffle_within_month:
    enabled: true
    seeds: 100
    real_must_exceed_placebo_percentile: 0.95
  sector_month_block_shuffle:
    enabled: true
  size_month_block_shuffle:
    enabled: true
  liquidity_month_block_shuffle:
    enabled: true
  time_block_permutation:
    enabled: true

random_date_tests:
  random_filing_date_within_sector_month: true
  month_preserved_date_shuffle: true
  future_shift_days: [30, 60, 90]
  pre_filing_placebo_trading_days: [5, 10, 20]

feature_placebos:
  shuffled_mismatch: true
  shuffled_text: true
  shuffled_fundamentals: true
  random_text_fundamental_pairing: true
  sector_median_narrative_replacement: true
  sector_median_fundamental_replacement: true
  random_dictionary_category_test: true

exposure_replication:
  controls_only: true
  size_liquidity_only: true
  sector_only: true
  momentum_only: true
  accruals_only: true
  quality_only: true
  anomaly_composite: true

delayed_execution:
  additional_trading_days: [1, 3, 5, 10]

cost_stress:
  one_way_bps: [0, 5, 10, 25, 50]
  verdict_a_requires_survival_at_bps: 10

liquidity_size_stress:
  high_liquidity_thresholds_usd: [25000000, 100000000]
  exclude_bottom_liquidity_bucket: true
  large_cap_only: true
  exclude_bottom_size_quintile: true
  min_price_thresholds_usd: [5, 10, 20]

sector_regime_stress:
  sector_neutral: true
  leave_one_sector_out: true
  no_2020: true
  no_2022: true
  no_best_year: true
  pre_post_regime_split: true

outlier_concentration:
  remove_top_bottom_1pct_stock_returns: true
  winsorized_stock_returns: true
  remove_top_contributors: [10, 25]
  remove_best_months: 5

data_quality_survivorship:
  high_text_quality_only: true
  no_exhibit_contamination: true
  high_xbrl_quality_only: true
  no_custom_tag_heavy: true
  no_ytd_conversion_rows: true
  missingness_only_model: true
  missing_label_concentration_by_decile: true
  delisting_distribution_by_decile: true
  conservative_missing_return_stress: true

outputs:
  dashboard: "outputs/failure_tests/failure_test_master_dashboard.csv"
  charts: "outputs/failure_tests/failure_test_charts.pdf"
  verdict_impact_matrix: "outputs/failure_tests/failure_test_verdict_impact_matrix.csv"
